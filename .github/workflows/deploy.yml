name: 部署工具页面

# 当有代码推送到 main 分支时触发
on:
  push:
    branches: [ main ]

# 给 Action 授予读写权限（解决权限不足的核心）
permissions:
  contents: write
  pages: write
  id-token: write

# 运行任务
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
