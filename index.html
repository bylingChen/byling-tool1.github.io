<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>新年行大运</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#f0e6d2;overflow-x:hidden}.container{max-width:1400px;margin:0 auto;padding:20px;position:relative}.header{text-align:center;padding:20px 0 30px;border-bottom:2px solid rgba(212,175,55,0.3);margin-bottom:30px}.title{font-size:3rem;color:#d4af37;text-shadow:0 0 30px rgba(212,175,55,0.6);letter-spacing:10px;margin-bottom:15px}.subtitle{font-size:1.1rem;color:rgba(240,230,210,0.85);letter-spacing:5px}.main-content{display:flex;flex-direction:column;align-items:center}.camera-section{position:fixed;top:20px;left:20px;width:320px;z-index:100;border-radius:12px;overflow:hidden}.video-container{position:relative;width:100%;border-radius:12px;overflow:hidden;border:3px solid rgba(212,175,55,0.4);background:#000;box-shadow:0 10px 40px rgba(0,0,0,0.6)}.video-container::after{content:"摄像头";position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.7);color:#d4af37;padding:4px 10px;border-radius:4px;font-size:0.8rem;z-index:3}#video{width:100%;height:auto;display:block;transform:scaleX(-1)}#canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}.loading-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}.loading-spinner{width:60px;height:60px;border:5px solid rgba(212,175,55,0.2);border-top-color:#d4af37;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{color:#d4af37;margin-top:15px;font-size:1rem;letter-spacing:3px}.lottery-section{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:750px;padding:30px 20px}.lottery-box{width:100%;aspect-ratio:16/10;background:linear-gradient(145deg,rgba(212,175,55,0.12),rgba(15,52,96,0.35));border:3px solid rgba(212,175,55,0.5);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 40px;box-shadow:0 15px 60px rgba(0,0,0,0.5),inset 0 0 80px rgba(212,175,55,0.05);position:relative;overflow:hidden}.lottery-box::before{content:"求签";position:absolute;top:30px;font-size:6rem;color:rgba(212,175,55,0.06);font-weight:bold;letter-spacing:20px;z-index:0}.lottery-result{text-align:center;z-index:1;position:relative}.result-title{font-size:1.4rem;color:rgba(240,230,210,0.85);margin-bottom:30px;letter-spacing:6px;text-shadow:0 2px 10px rgba(0,0,0,0.5)}.result-text{font-size:5rem;font-weight:bold;color:#d4af37;text-shadow:0 0 50px rgba(212,175,55,0.8),0 4px 20px rgba(0,0,0,0.8);margin-bottom:35px;min-height:120px;display:flex;align-items:center;justify-content:center;transition:all 0.3s}.result-desc{font-size:1.15rem;color:rgba(240,230,210,0.95);line-height:1.9;padding:25px;background:rgba(0,0,0,0.5);border-radius:15px;border-left:5px solid #d4af37;min-height:100px;max-width:90%;box-shadow:0 5px 30px rgba(0,0,0,0.4)}.status-indicator{position:absolute;top:20px;right:20px;padding:10px 18px;background:rgba(0,0,0,0.8);border-radius:25px;font-size:0.9rem;display:flex;align-items:center;gap:10px;z-index:5;border:1px solid rgba(212,175,55,0.3)}.status-dot{width:12px;height:12px;border-radius:50%;background:#666;box-shadow:0 0 10px rgba(102,102,102,0.5)}.status-dot.active{background:#4ade80;box-shadow:0 0 15px rgba(74,222,128,0.6)}.status-dot.rolling{background:#fbbf24;box-shadow:0 0 15px rgba(251,191,36,0.6);animation:pulse 0.6s infinite}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.9)}}.retry-btn{margin-top:30px;padding:15px 60px;font-size:1.2rem;background:linear-gradient(135deg,#d4af37,#b8860b);color:#1a1a2e;border:none;border-radius:50px;cursor:pointer;font-weight:bold;letter-spacing:4px;box-shadow:0 8px 25px rgba(212,175,55,0.5);transition:all 0.3s ease}.retry-btn:hover{transform:translateY(-4px);box-shadow:0 12px 35px rgba(212,175,55,0.7)}.retry-btn:active{transform:translateY(-2px)}.retry-btn.hidden{display:none}.footer-info{margin-top:30px;padding:20px;background:rgba(0,0,0,0.5);border-radius:15px;border:2px solid rgba(212,175,55,0.3);width:100%;max-width:700px;text-align:center}.gesture-label{color:rgba(240,230,210,0.75);font-size:0.95rem}.gesture-value{color:#d4af37;font-weight:bold;font-size:1.15rem;margin-left:12px;display:inline-block}.instruction{color:rgba(240,230,210,0.8);font-size:1rem;margin-top:18px;line-height:1.8}.instruction-key{color:#d4af37;font-weight:bold;font-size:1.05rem}.roll-animation{animation:rollShake 0.3s ease-in-out infinite}@keyframes rollShake{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-10px) rotate(-3deg)}75%{transform:translateY(-10px) rotate(3deg)}}.result-pop{animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1)}@keyframes popIn{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}.error-message{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#dc2626,#b91c1c);color:white;padding:18px 35px;border-radius:12px;z-index:1000;display:none;box-shadow:0 10px 40px rgba(220,38,38,0.5);font-size:1rem;border:2px solid rgba(255,255,255,0.2)}.error-message.show{display:block;animation:slideIn 0.3s ease}@keyframes slideIn{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}@media(max-width:900px){.camera-section{position:relative;top:0;left:0;width:100%;max-width:450px;margin:0 auto 30px}.title{font-size:2.2rem}.subtitle{font-size:1rem}.lottery-box{aspect-ratio:4/3;padding:30px 20px}.result-text{font-size:3.5rem}}</style></head><body><div id="errorMessage" class="error-message"></div><div class="container"><header class="header"><h1 class="title">新年行大运</h1><p class="subtitle">手势抽签，开启你的好运</p></header><div class="main-content"><div class="camera-section"><div class="video-container"><div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div><div class="loading-text">正在初始化摄像头...</div></div><video id="video" autoplay playsinline></video><canvas id="canvas"></canvas><div id="statusIndicator" class="status-indicator"><div id="statusDot" class="status-dot"></div><span id="statusText">准备中</span></div></div></div><div class="lottery-section"><div class="lottery-box"><div class="lottery-result"><div id="resultTitle" class="result-title">等待求签</div><div id="resultText" class="result-text">🙏</div><div id="resultDesc" class="result-desc">请张开手掌开始摇签，心诚则灵</div></div></div><button id="retryBtn" class="retry-btn hidden">再来一签</button><div class="footer-info"><div><span class="gesture-label">当前手势：</span><span id="gestureValue" class="gesture-value">未检测</span></div><div class="instruction"><span class="instruction-key">🖐 张开手掌</span> 开始摇签  <span class="instruction-key">✊ 握拳</span> 停止摇签</div></div></div></div></div><script src="https://cdn.jsdelivr.net/npm/handtrackjs@0.0.11/dist/handtrack.min.js"></script><script>(function(){"use strict";var AppState={IDLE:"idle",ROLLING:"rolling",FINISHED:"finished"};var currentState=AppState.IDLE;var lastGestureTime=0;var rollInterval=null;var modelLoaded=false;var model=null;var detectionRunning=false;var lotteryResults=[{name:"大吉",description:"万事亨通，诸事顺遂，宜积极进取，必有收获。",color:"#ef4444"},{name:"中吉",description:"运势平稳，小有收获，保持耐心，循序渐进。",color:"#f97316"},{name:"小吉",description:"略有好运，小事可成，谨慎行事，避免冒进。",color:"#fbbf24"},{name:"吉",description:"吉祥如意，顺势而为，把握机会，事半功倍。",color:"#84cc16"},{name:"半吉",description:"吉凶参半，需谨慎抉择，权衡利弊而后行。",color:"#06b6d4"},{name:"末吉",description:"先难后易，初期多阻，坚持到底终有转机。",color:"#3b82f6"},{name:"凶",description:"运势低迷，宜守不宜攻，静待时机，避免冲动。",color:"#8b5cf6"},{name:"大凶",description:"诸事不利，宜静不宜动，修身养性，等待转运。",color:"#64748b"}];var video=document.getElementById("video"),canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");var loadingOverlay=document.getElementById("loadingOverlay"),errorMessage=document.getElementById("errorMessage"),statusDot=document.getElementById("statusDot"),statusText=document.getElementById("statusText"),gestureValue=document.getElementById("gestureValue"),resultTitle=document.getElementById("resultTitle"),resultText=document.getElementById("resultText"),resultDesc=document.getElementById("resultDesc"),retryBtn=document.getElementById("retryBtn");var GESTURE_DEBOUNCE=800,DETECTION_INTERVAL=100,MIN_SCORE=0.6;function showError(msg){errorMessage.textContent=msg;errorMessage.classList.add("show");setTimeout(function(){errorMessage.classList.remove("show")},4000);}function updateStatusIndicator(status,text){statusDot.className="status-dot "+status;statusText.textContent=text;}function updateGestureDisplay(gesture){gestureValue.textContent=gesture;}function drawLottery(){return lotteryResults[Math.floor(Math.random()*lotteryResults.length)];}function updateLotteryDisplay(result,isRolling){if(isRolling){var r=drawLottery();resultTitle.textContent="🎲 摇签中...";resultText.textContent=r.name;resultText.style.color="#d4af37";resultText.style.textShadow="0 0 50px rgba(212,175,55,0.8)";resultDesc.textContent="握拳即可停止摇签";resultText.classList.add("roll-animation");resultText.classList.remove("result-pop");}else{resultTitle.textContent="🎯 求签结果";resultText.textContent=result.name;resultText.style.color=result.color;resultText.style.textShadow="0 0 50px "+result.color+",0 4px 20px rgba(0,0,0,0.8)";resultDesc.textContent=result.description;resultText.classList.remove("roll-animation");resultText.classList.add("result-pop");setTimeout(function(){resultText.classList.remove("result-pop")},600);}}function startRolling(){if(currentState!==AppState.IDLE&&currentState!==AppState.FINISHED)return;currentState=AppState.ROLLING;updateStatusIndicator("rolling","摇签中");rollInterval=setInterval(function(){updateLotteryDisplay(null,true)},100);}function stopRolling(){if(currentState!==AppState.ROLLING)return;clearInterval(rollInterval);rollInterval=null;var result=drawLottery();currentState=AppState.FINISHED;updateStatusIndicator("active","已完成");updateLotteryDisplay(result,false);retryBtn.classList.remove("hidden");}function resetState(){currentState=AppState.IDLE;updateStatusIndicator("","准备中");resultTitle.textContent="等待求签";resultText.textContent="🙏";resultText.style.color="#d4af37";resultText.style.textShadow="0 0 30px rgba(212,175,55,0.6)";resultDesc.textContent="请张开手掌开始摇签，心诚则灵";retryBtn.classList.add("hidden");}function detectLoop(){if(!modelLoaded||!model||detectionRunning){setTimeout(detectLoop,DETECTION_INTERVAL);return;}detectionRunning=true;model.detect(video).then(function(detections){ctx.clearRect(0,0,canvas.width,canvas.height);if(detections&&detections.length>0){var det=detections[0],bbox=det.bbox,score=det.score;ctx.strokeStyle="#d4af37";ctx.lineWidth=3;ctx.strokeRect(bbox.x,bbox.y,bbox.width,bbox.height);ctx.fillStyle="rgba(212,175,55,0.8)";ctx.fillRect(bbox.x,bbox.y-25,bbox.width,25);ctx.fillStyle="#000";ctx.font="bold 14px Arial";ctx.fillText("手 "+Math.round(score*100)+"%",bbox.x+5,bbox.y-8);updateGestureDisplay(score>MIN_SCORE?"🖐 张开":"未检测");var now=Date.now();if(score>MIN_SCORE&&now-lastGestureTime>GESTURE_DEBOUNCE){lastGestureTime=now;if(currentState===AppState.IDLE||currentState===AppState.FINISHED){if(currentState===AppState.FINISHED)resetState();setTimeout(startRolling,300);}}}else{updateGestureDisplay("未检测");var now=Date.now();if(currentState===AppState.ROLLING&&now-lastGestureTime>GESTURE_DEBOUNCE){lastGestureTime=now;stopRolling();}}}).catch(function(err){console.error("检测错误:",err);}).finally(function(){detectionRunning=false;});setTimeout(detectLoop,DETECTION_INTERVAL);}retryBtn.addEventListener("click",function(){resetState();setTimeout(function(){if(currentState===AppState.IDLE){startRolling();}},500);});function initCamera(){return navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:"user"},audio:false}).then(function(stream){video.srcObject=stream;return new Promise(function(resolve){video.onloadedmetadata=function(){canvas.width=video.videoWidth;canvas.height=video.videoHeight;video.play();resolve();};});}).catch(function(err){showError("无法访问摄像头，请检查权限设置");loadingOverlay.innerHTML="<div style=\"\"color:#ef4444;font-size:1.1rem;\"\">❌ 摄像头初始化失败</div>";throw err;});}function loadModel(){return handtrack.load({maxNumBoxes:1,iouThreshold:0.5,scoreThreshold:0.5}).then(function(m){model=m;modelLoaded=true;loadingOverlay.style.display="none";updateStatusIndicator("","准备就绪");detectLoop();}).catch(function(err){showError("模型加载失败，请检查网络");loadingOverlay.innerHTML="<div style=\"\"color:#ef4444;font-size:1.1rem;\"\">❌ 模型加载失败</div>";});}function initApp(){initCamera().then(function(){return loadModel();}).catch(function(err){console.error("初始化失败:",err);});}if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",initApp);}else{initApp();}window.addEventListener("beforeunload",function(){if(video.srcObject){video.srcObject.getTracks().forEach(function(t){t.stop();});}if(rollInterval){clearInterval(rollInterval);}detectionRunning=false;});})();</script></body></html>
